apiVersion: apps/v1
kind: Deployment
metadata:
  name: devonz-web-editor
  labels:
    app: devonz-web-editor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devonz-web-editor
  template:
    metadata:
      labels:
        app: devonz-web-editor
    spec:
      containers:
        - name: web-editor
          image: devflexai/devonz-web-editor:latest
          ports:
            - containerPort: 3030
          env:
            - name: DEVONZ_API_URL
              valueFrom:
                secretKeyRef:
                  name: devonz-secrets
                  key: api-url
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3030
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3030
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devonz-web-editor-svc
spec:
  selector:
    app: devonz-web-editor
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3030
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devonz-web-editor-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  rules:
    - host: editor.devonz.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devonz-web-editor-svc
                port:
                  number: 80
  tls:
    - hosts:
        - editor.devonz.ai
      secretName: devonz-tls
