name: Release Desktop Editor

on:
  push:
    tags:
      - "desktop/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

env:
  NODE_VERSION: "20"
  # Prevents OOM on large VS Code fork builds
  NODE_OPTIONS: "--max-old-space-size=6144"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # LINUX — produces .deb + .AppImage (x64)
  # ─────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (x64) — .deb + .AppImage
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/apps/desktop/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxkbfile-dev libsecret-1-dev \
            libkrb5-dev fakeroot rpm xvfb \
            pkg-config python3 python3-pip \
            libgtk-3-dev libnss3-dev libasound2-dev \
            libxshmfence-dev libgbm-dev libgles2-mesa-dev

      - name: Install desktop dependencies
        working-directory: repo/apps/desktop
        run: npm ci --legacy-peer-deps

      - name: Compile TypeScript
        working-directory: repo/apps/desktop
        run: npm run compile
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Build — Linux x64
        working-directory: repo/apps/desktop
        run: |
          npm run gulp vscode-linux-x64-min
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package .deb
        working-directory: repo/apps/desktop
        run: |
          npm run gulp vscode-linux-x64-prepare-deb
          npm run gulp vscode-linux-x64-build-deb
        continue-on-error: true

      - name: Package .AppImage
        working-directory: repo/apps/desktop
        run: |
          npm run gulp vscode-linux-x64-prepare-appimage
          npm run gulp vscode-linux-x64-build-appimage
        continue-on-error: true

      - name: Collect artifacts
        run: |
          mkdir -p /tmp/artifacts
          find repo/apps/desktop/.build -name "*.deb" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          find repo/apps/desktop/.build -name "*.AppImage" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          # Fallback: tar up the built folder
          if [ -d "repo/apps/desktop/.build/linux" ]; then
            cd repo/apps/desktop/.build/linux
            tar -czf /tmp/artifacts/devonz-editor-linux-x64.tar.gz . 
          fi
          ls -lh /tmp/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: /tmp/artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # WINDOWS — produces .exe (NSIS installer, x64)
  # ─────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (x64) — .exe installer
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm ci --legacy-peer-deps

      - name: Compile TypeScript
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm run compile
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Build — Windows x64
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm run gulp vscode-win32-x64-min
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package — NSIS installer
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm run gulp vscode-win32-x64-inno-updater
        continue-on-error: true

      - name: Package — System setup .exe
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm run gulp vscode-win32-x64-system-setup
        continue-on-error: true

      - name: Package — User setup .exe
        working-directory: repo/apps/desktop
        shell: cmd
        run: npm run gulp vscode-win32-x64-user-setup
        continue-on-error: true

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\artifacts
          Get-ChildItem -Path repo\apps\desktop\.build -Recurse -Include "*.exe","*.msi" | Copy-Item -Destination C:\artifacts\ -ErrorAction SilentlyContinue
          # Fallback zip
          if (Test-Path "repo\apps\desktop\.build\win32-x64") {
            Compress-Archive -Path "repo\apps\desktop\.build\win32-x64\*" -DestinationPath "C:\artifacts\devonz-editor-windows-x64.zip" -Force
          }
          Get-ChildItem C:\artifacts\

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: C:\artifacts\
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # macOS INTEL — produces .dmg (x64 / darwin)
  # ─────────────────────────────────────────────────────────────────
  build-macos-intel:
    name: macOS Intel (x64) — .dmg
    runs-on: macos-13        # macos-13 = Intel x64
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: repo/apps/desktop
        run: npm ci --legacy-peer-deps

      - name: Compile TypeScript
        working-directory: repo/apps/desktop
        run: npm run compile
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Build — macOS x64
        working-directory: repo/apps/desktop
        run: npm run gulp vscode-darwin-x64-min
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package — .dmg (Intel)
        working-directory: repo/apps/desktop
        run: |
          npm run gulp vscode-darwin-x64
          # create-dmg is more reliable than hdiutil for CI
          brew install create-dmg || true
          APP=$(find .build -name "Devonz Editor.app" -maxdepth 5 | head -1)
          if [ -n "$APP" ]; then
            create-dmg \
              --volname "Devonz Editor" \
              --volicon "devonz_icons/devonz-128.png" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --icon "Devonz Editor.app" 200 190 \
              --hide-extension "Devonz Editor.app" \
              --app-drop-link 600 185 \
              ".build/devonz-editor-darwin-x64.dmg" \
              "$(dirname "$APP")/"
          fi
        continue-on-error: true

      - name: Fallback — tar if no .dmg
        run: |
          mkdir -p /tmp/artifacts
          find repo/apps/desktop/.build -name "*.dmg" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          if [ -z "$(ls /tmp/artifacts/*.dmg 2>/dev/null)" ]; then
            APP=$(find repo/apps/desktop/.build -name "*.app" -maxdepth 5 | head -1)
            if [ -n "$APP" ]; then
              tar -czf /tmp/artifacts/devonz-editor-darwin-x64.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
            fi
          fi
          ls -lh /tmp/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel-x64
          path: /tmp/artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # macOS ARM64 — produces .dmg (Apple Silicon / M1/M2/M3/M4)
  # ─────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon (arm64) — .dmg
    runs-on: macos-14        # macos-14 = Apple Silicon M1 runner (free)
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: repo/apps/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: repo/apps/desktop
        run: npm ci --legacy-peer-deps

      - name: Compile TypeScript
        working-directory: repo/apps/desktop
        run: npm run compile
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Build — macOS arm64
        working-directory: repo/apps/desktop
        run: npm run gulp vscode-darwin-arm64-min
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Package — .dmg (Apple Silicon)
        working-directory: repo/apps/desktop
        run: |
          npm run gulp vscode-darwin-arm64
          brew install create-dmg || true
          APP=$(find .build -name "Devonz Editor.app" -maxdepth 5 | head -1)
          if [ -n "$APP" ]; then
            create-dmg \
              --volname "Devonz Editor" \
              --volicon "devonz_icons/devonz-128.png" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --icon "Devonz Editor.app" 200 190 \
              --hide-extension "Devonz Editor.app" \
              --app-drop-link 600 185 \
              ".build/devonz-editor-darwin-arm64.dmg" \
              "$(dirname "$APP")/"
          fi
        continue-on-error: true

      - name: Fallback — tar if no .dmg
        run: |
          mkdir -p /tmp/artifacts
          find repo/apps/desktop/.build -name "*.dmg" -exec cp {} /tmp/artifacts/ \; 2>/dev/null || true
          if [ -z "$(ls /tmp/artifacts/*.dmg 2>/dev/null)" ]; then
            APP=$(find repo/apps/desktop/.build -name "*.app" -maxdepth 5 | head -1)
            if [ -n "$APP" ]; then
              tar -czf /tmp/artifacts/devonz-editor-darwin-arm64.tar.gz -C "$(dirname "$APP")" "$(basename "$APP")"
            fi
          fi
          ls -lh /tmp/artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: /tmp/artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # RELEASE — collects all 4 artifacts and creates a GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos-intel, build-macos-arm64]
    runs-on: ubuntu-latest
    if: always()   # run even if some builds failed (partial release is fine)
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=desktop/v$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Rename artifacts with version
        run: |
          cd artifacts
          VERSION="${{ steps.version.outputs.version }}"
          for f in *; do
            # Only rename if file doesn't already have version in name
            if [[ "$f" != *"$VERSION"* ]]; then
              BASE="${f%.*}"
              EXT="${f##*.}"
              mv "$f" "${BASE}-v${VERSION}.${EXT}" 2>/dev/null || true
            fi
          done
          ls -lh

      - name: Generate release notes
        id: notes
        run: |
          cat > /tmp/release-notes.md << NOTES
          ## Devonz Editor v${{ steps.version.outputs.version }}

          AI-powered code editor built on VS Code. Download for your platform:

          | Platform | File | Notes |
          |---|---|---|
          | 🐧 Linux | \`devonz-editor-linux-x64.*\` | `.deb` for Debian/Ubuntu, `.AppImage` runs anywhere |
          | 🪟 Windows | \`devonz-editor-windows-x64.*\` | NSIS installer — run and follow prompts |
          | 🍎 macOS Intel | \`devonz-editor-darwin-x64.dmg\` | For Macs with Intel CPUs (pre-2020) |
          | 🍎 macOS Apple Silicon | \`devonz-editor-darwin-arm64.dmg\` | For M1, M2, M3, M4 Macs |

          ### macOS note
          First launch: right-click the app → Open (to bypass Gatekeeper on unsigned builds).

          ### What's inside
          - Full VS Code-based editor with Devonz AI built in
          - Real-time sync with the Devonz web platform via \`@devonz/bridge\`
          - Multi-provider AI: OpenAI, Anthropic, Gemini, Ollama
          NOTES

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Devonz Editor v${{ steps.version.outputs.version }}"
          body_path: /tmp/release-notes.md
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
